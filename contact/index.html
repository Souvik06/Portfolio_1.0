<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Souvik Chatterjee</title>
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
    <script>
      (function () {
        var t = localStorage.getItem('theme');
        if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <link rel="stylesheet" href="../theme.css">
    <link rel="stylesheet" href="contact.css">
</head>
<body>
    <script>window.SITE_ROOT = "../"; window.SITE_PAGE = "contact";</script>

    <!-- Navigation (injected by theme.js) -->
    <div id="site-nav"></div>

    <section class="section">
        <p class="eyebrow">Get in Touch</p>
        <h2 class="section-title">Contact Me</h2>

        <div class="contact-methods">
            <a class="card contact-method" href="mailto:souvik.chat2011@gmail.com">
                <i class="fa-solid fa-envelope"></i>
                <span>souvik.chat2011@gmail.com</span>
            </a>
            <a class="card contact-method" href="https://www.linkedin.com/in/souvik06/" target="_blank" rel="noopener">
                <i class="fa-brands fa-linkedin-in"></i>
                <span>linkedin.com/in/souvik06</span>
            </a>
        </div>

        <form class="contact-form card" id="contactForm" name="contact" method="POST" data-netlify="true" data-netlify-honeypot="bot-field">
            <h3>Contact Me for Work / General Enquiries</h3>
            <!-- Netlify needs this so the submission is tied to the "contact" form -->
            <input type="hidden" name="form-name" value="contact">
            <!-- Honeypots (must stay empty): bot-field = Netlify, botcheck = W3Forms -->
            <p class="hidden-field" hidden><label>Don’t fill this out if you’re human: <input name="bot-field"></label></p>
            <input type="checkbox" name="botcheck" tabindex="-1" autocomplete="off" style="display:none;">
            <div class="form-field">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" autocomplete="name" required>
            </div>
            <div class="form-field">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" autocomplete="email" required>
            </div>
            <div class="form-field">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" autocomplete="tel">
            </div>
            <div class="form-field">
                <label for="enquiry">Enquiry</label>
                <textarea id="enquiry" name="message" rows="4" required></textarea>
            </div>
            <div class="form-check">
                <input type="checkbox" id="isclient" name="project_interest" value="Yes">
                <label for="isclient">I want you to work on a project with me</label>
            </div>
            <p class="form-note">*We'll never share your email &amp; phone with anyone else.</p>
            <div id="formStatus" class="form-status" role="status" aria-live="polite"></div>
            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-paper-plane"></i> Submit</button>
        </form>
    </section>

    <!-- Footer (injected by theme.js) -->
    <div id="site-footer"></div>

    <script src="../theme.js"></script>
    <script src="contact.js"></script>
</body>
</html>
