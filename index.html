<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Souvik Chatterjee - Senior Quality Engineer / SDET</title>
    <link rel="icon" type="image/x-icon" href="./assets/favicon.ico">
    <link rel="preload" as="image" href="./assets/profile-pic.png" fetchpriority="high">
    <link rel="preload" as="image" href="./assets/about-pic.jpeg">
    <script>
      (function () {
        var t = localStorage.getItem('theme');
        if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <script>window.SITE_ROOT = "./"; window.SITE_PAGE = "home";</script>

    <!-- Navigation (injected by theme.js) -->
    <div id="site-nav"></div>

    <!-- Hero -->
    <main class="hero">
        <div class="hero-inner">
            <div class="hero-text">
                <p class="hero-greeting">Hi, I'm</p>
                <h1 class="hero-name">Souvik Chatterjee</h1>
                <h2 class="hero-role">Senior Quality Engineer / SDET</h2>
                <p class="hero-tagline">Playwright · TypeScript · Selenium · Agentic AI · ~5 Years</p>
                <p class="hero-sub">Currently working in LTIMindtree as Senior Quality Engineer</p>

                <div class="hero-stats">
                    <div class="stat-chip"><span>90%</span> Faster Regression</div>
                    <div class="stat-chip"><span>98%</span> Test Stability</div>
                    <div class="stat-chip"><span>75%</span> Less Dev Effort</div>
                </div>

                <div class="hero-buttons">
                    <a href="./assets/resume.pdf" target="_blank" rel="noopener"><button class="btn btn-primary"><i class="fa-solid fa-file-lines"></i> Resume</button></a>
                    <a href="./contact/"><button class="btn btn-outline"><i class="fa-solid fa-paper-plane"></i> Contact Me</button></a>
                </div>
            </div>

            <div class="hero-pic">
                <img src="./assets/profile-pic.png" alt="Souvik Chatterjee">
            </div>
        </div>
    </main>

    <!-- Footer (injected by theme.js) -->
    <div id="site-footer"></div>

    <script src="theme.js"></script>
</body>
</html>
